<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | AZL Consulting and Trading</title>
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @layer theme {
            :root {
                --primary: #0B1F3A; --secondary: #FFFFFF; --accent: #C8A96B; --accent-hover: #b5985b; --text-main: #333333; --bg-light: #F8F9FA;
            }
        }
        @layer base {
            body { font-family: 'Inter', sans-serif; color: var(--text-main); background-color: var(--bg-light); -webkit-font-smoothing: antialiased; }
            h1, h2, h3, h4 { font-family: 'Playfair Display', serif; color: var(--primary); }
        }
        @layer components {
            .btn-primary { @apply inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-[var(--accent)] hover:bg-[var(--accent-hover)] transition-colors duration-300; }
            .input-field { @apply mt-1 block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:ring-[var(--primary)] focus:border-[var(--primary)] text-sm; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div id="root"></div>
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Offices.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="contact-app.js"></script>
</body>
</html>
